version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: inventario_textil_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: inventario_textil
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/data/postgres/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
